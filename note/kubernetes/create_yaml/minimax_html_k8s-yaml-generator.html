<!DOCTYPE html>
<html lang="zh-CN">

    <style>
        *{margin:0;padding:0;box-sizing:border-box}:root{--bg:#1e1e1e;--bg2:#252526;--bg3:#2d2d2d;--bg4:#3c3c3c;--border:#404040;--text:#d4d4d4;--text2:#808080;--blue:#569cd6;--accent:#007acc;--green:#4ec9b0;--orange:#ce9178;--yellow:#dcdcaa;--purple:#c586c0;--red:#f14c4c;--cyan:#4fc1ff}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}.logo{font-size:18px;font-weight:600;color:var(--accent)}.logo span{color:var(--green)}.tabs{display:flex;gap:4px;flex-wrap:wrap}.tab{padding:8px 16px;background:transparent;border:none;color:var(--text2);font-size:14px;cursor:pointer;border-radius:4px;transition:all .2s}.tab:hover{background:var(--bg3);color:var(--text)}.tab.active{background:var(--accent);color:#fff}.main{display:flex;height:calc(100vh - 57px)}@media(max-width:1024px){.main{flex-direction:column}.form-panel,.preview-panel{width:100%;height:50%}.form-panel{border-right:none;border-bottom:1px solid var(--border)}}.form-panel{width:55%;overflow-y:auto;padding:20px;border-right:1px solid var(--border)}.form-section{margin-bottom:24px}.section-title{font-size:14px;font-weight:600;color:var(--blue);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}.form-row{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:12px}.form-row.single{grid-template-columns:1fr}.form-group{display:flex;flex-direction:column;gap:4px}.form-group.full-width{grid-column:1/-1}label{font-size:12px;color:var(--text2)}label .required{color:var(--red)}input,select,textarea{padding:8px 12px;background:var(--bg4);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:13px;transition:border-color .2s}input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}textarea{resize:vertical;min-height:60px;font-family:inherit}.list-item{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:12px;margin-bottom:8px}.list-item-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}.list-item-title{font-size:13px;font-weight:500;color:var(--yellow)}.btn-remove{padding:4px 10px;background:var(--red);border:none;border-radius:4px;color:#fff;font-size:12px;cursor:pointer}.btn-remove:hover{opacity:.8}.btn-add{width:100%;padding:10px;background:var(--bg3);border:1px dashed var(--border);border-radius:6px;color:var(--accent);font-size:13px;cursor:pointer;transition:all .2s}.btn-add:hover{border-color:var(--accent);background:rgba(0,122,204,.1)}.preview-panel{width:45%;display:flex;flex-direction:column;background:var(--bg)}.preview-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--border)}.preview-title{font-size:14px;font-weight:500}.preview-actions{display:flex;gap:8px}.btn{padding:8px 16px;border:none;border-radius:4px;font-size:13px;cursor:pointer;transition:all .2s}.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#0066b8}.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border)}.btn-secondary:hover{background:var(--bg4)}.btn-copy{background:var(--green);color:#1e1e1e}.btn-copy.copied{background:#2e7d32;color:#fff}.preview-content{flex:1;overflow:auto;padding:16px;background:#1a1a1a}.yaml-preview{font-family:'Fira Code','Consolas','Monaco',monospace;font-size:13px;line-height:1.5;white-space:pre}.yaml-key{color:#9cdcfe}.yaml-string{color:#ce9178}.yaml-number{color:#b5cea8}.yaml-bool{color:#569cd6}.yaml-null{color:#569cd6}.template-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}.btn-template{padding:6px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:16px;color:var(--text2);font-size:12px;cursor:pointer;transition:all .2s}.btn-template:             </div>
        </section>
    </main>
    <div class="toast" id="toast">已复制到剪贴板</div>
    <script>

        const defaults={deployment:{name:'my-app',namespace:'default',replicas:3,labels:{app:'my-app'},annotations:{},selector:{app:'my-app'},containers:[{name:'app',image:'nginx:latest',command:'',args:'',ports:[{name:'http',protocol:'TCP',port:80,targetPort:80}],env:[],resources:{requests:{cpu:'100m',memory:'128Mi'},limits:{cpu:'500m',memory:'512Mi'}},volumeMounts:[]}],volumes:[],restartPolicy:'Always',serviceAccount:'',imagePullSecrets:[]},statefulset:{name:'my-statefulset',namespace:'default',replicas:3,labels:{app:'my-app'},annotations:{},selector:{app:'my-app'},serviceName:'my-headless',containers:[{name:'app',image:'nginx:latest',command:'',args:'',ports:[{name:'http',protocol:'TCP',port:80,targetPort:80}],env:[],resources:{requests:{cpu:'100m',memory:'128Mi'},limits:{cpu:'500m',memory:'512Mi'}},volumeMounts:[]}],volumes:[],restartPolicy:'Always',serviceAccount:'',imagePullSecrets:[]},daemonset:{name:'my-daemonset',namespace:'default',labels:{app:'my-app'},annotations:{},selector:{app:'my-app'},containers:[{name:'app',image:'nginx:latest',command:'',args:'',ports:[],env:[],resources:{requests:{cpu:'100m',memory:'128Mi'},limits:{cpu:'500m',memory:'512Mi'}},volumeMounts:[]}],volumes:[],restartPolicy:'Always',serviceAccount:'',imagePullSecrets:[]},job:{name:'my-job',namespace:'default',labels:{app:'my-job'},annotations:{},backoffLimit:6,containers:[{name:'job',image:'busybox:latest',command:'echo',args:'Hello World',ports:[],env:[],resources:{},volumeMounts:[]}],volumes:[],restartPolicy:'Never',serviceAccount:'',imagePullSecrets:[]},cronjob:{name:'my-cronjob',namespace:'default',labels:{app:'my-cronjob'},annotations:{},schedule:'0 * * * *',concurrencyPolicy:'Forbid',successfulJobsHistoryLimit:3,failedJobsHistoryLimit:1,startingDeadlineSeconds:200,containers:[{name:'cronjob',image:'busybox:latest',command:'echo',args:'Hello World',ports:[],env:[],resources:{},volumeMounts:[]}],volumes:[],restartPolicy:'Never',serviceAccount:'',imagePullSecrets:[]},pod:{name:'my-p volumeMounts:[]}],volumes:[],restartPolicy:'Never',serviceAccount:'',imagePullSecrets:[]}}],cronjob:[{name:'Daily Backup',data:{name:'db-backup-cron',namespace:'default',labels:{app:'db-backup'},annotations:{},schedule:'0 2 * * *',concurrencyPolicy:'Forbid',successfulJobsHistoryLimit:3,failedJobsHistoryLimit:1,startingDeadlineSeconds:200,containers:[{name:'backup',image:'postgres:15-alpine',command:'',args:'',ports:[],env:[],resources:{requests:{cpu:'100m',memory:'64Mi'},limits:{cpu:'200m',memory:'256Mi'}},volumeMounts:[]}],volumes:[],restartPolicy:'Never',serviceAccount:'',imagePullSecrets:[]}}],pod:[{name:'Debug Pod',data:{name:'debug-pod',namespace:'default',labels:{purpose:'debug'},annotations:{},containers:[{name:'busybox',image:'busybox:latest',command:'sh',args:'',ports:[],env:[],resources:{},volumeMounts:[]}],volumes:[],restartPolicy:'Always',serviceAccount:'',imagePullSecrets:[]}}],service:[{name:'ClusterIP Service',data:{name:'my-service',namespace:'default',labels:{},annotations:{},type:'ClusterIP',selector:{app:'my-app'},ports:[{name:'http',protocol:'TCP',port:80,targetPort:80,nodePort:''}]}},{name:'NodePort Service',data:{name:'my-nodeport',namespace:'default',labels:{},annotations:{},type:'NodePort',selector:{app:'my-app'},ports:[{name:'http',protocol:'TCP',port:80,targetPort:80,nodePort:30080}]}}],configmap:[{name:'App Config',data:{name:'app-config',namespace:'default',labels:{app:'my-app'},annotations:{},data:{'config.json':'{\n  "database": {\n    "host": "localhost",\n    "port": 5432\n  }\n}'}}}],secret:[{name:'Basic Auth',data:{name:'auth-secret',namespace:'default',labels:{app:'my-app'},annotations:{},type:'Opaque',data:{username:btoa('admin'),password:btoa('changeme')}}}]};
        function deepClone(obj){return JSON.parse(JSON.stringify(obj))}
        function generateId(){return Math.random().toString(36).substr(2,9)}
        function debounce(fn,delay){return function(...args){clearTimeout(state.debounceTimer);state.debounceTimer=setTimeout(()=>fn.apply(this,args),delay)}}
        function parseLabels(text){const labels={};text.split('\n').filter(l=>l.trim()).forEach(line=>{const idx=line.indexOf('=');if(idx>0)labels[line.slice(0,idx).trim()]=line.slice(idx+1).trim()});return labels}
        function syntaxHighlight(yaml){return yaml.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/(^|\n)([\w-]+):/g,'$1<span class="yaml-key">$2</span>:').replace(/:\s*("(?:[^"\\]|\\.)*")/g,': <span class="yaml-string">$1</span>').replace(/:\s*(true|false)/gi,': <span class="yaml-bool">$1</span>').replace(/:\s*(null|~)/gi,': <span class="yaml-null">$1</span>').replace(/:\s*(-?\d+(?:\.\d+)?)/g,': <span class="yaml-number">$1</span>')}

        function buildPodSpec(data){
            const spec={restartPolicy:data.restartPolicy||'Always',containers:(data.containers||[]).map(c=>buildContainer(c))};
            if(data.volumes&&data.volumes.length>0)spec.volumes=data.volumes.map(v=>buildVolume(v));
            if(data.serviceAccount)spec.serviceAccountName=data.serviceAccount;
            if(data.imagePullSecrets&&data.imagePullSecrets.length>0)spec.imagePullSecrets=data.imagePullSecrets.map(s=>({name:s.name||s}));
            return spec;
        }
        function buildContainer(c){
            const container={name:c.name,image:c.image};
            if(c.command)container.command=c.command.split(' ').filter(s=>s);
            if(c.args)container.args=c.args.split(' ').filter(s=>s);
            if(c.ports&&c.ports.length>0)container.ports=c.ports.map(p=>{const port={containerPort:parseInt(p.targetPort)||p.targetPort};if(p.name)port.name=p.name;if(p.protocol)port.protocol=p.protocol;return port});
            if(c.env&&c.env.length>0)container.env=c.env.filter(e=>e.name).map(e=>{const envVar={name:e.name};if(e.value)envVar.value=e.value;return envVar});
            if(c.resources&&(Object.keys(c.resources.requests||{}).length||Object.keys(c.resources.limits||{}).length)){
                container.resources={};
                if(Object.keys(c.resources.requests||{}).length){container.resources.requests={};if(c.resources.requests.cpu)container.resources.requests.cpu=c.resources.requests.cpu;if(c.resources.requests.memory)container.resources.requests.memory=c.resources.requests.memory}
                if(Object.keys(c.resources.limits||{}).length){container.resources.limits={};if(c.resources.limits.cpu)container.resources.limits.cpu=c.resources.limits.cpu;if(c.resources.limits.memory)container.resources.limits.memory=c.resources.limits.memory}

        }
        function buildDeploymentYAML(data){const obj={apiVersion:'apps/v1',kind:'Deployment',metadata:{name:data.name,namespace:data.namespace||'default',labels:Object.keys(data.labels||{}).length?data.labels:undefined},spec:{replicas:data.replicas||1,selector:{matchLabels:data.selector||{}},template:{metadata:{labels:data.selector||{}},spec:buildPodSpec(data)}}};if(Object.keys(data.annotations||{}).length)obj.metadata.annotations=data.annotations;return obj;}
        function buildStatefulSetYAML(data){const obj={apiVersion:'apps/v1',kind:'StatefulSet',metadata:{name:data.name,namespace:data.namespace||'default',labels:Object.keys(data.labels||{}).length?data.labels:undefined},spec:{serviceName:data.serviceName||'',replicas:data.replicas||1,selector:{matchLabels:data.selector||{}},template:{metadata:{labels:data.selector||{}},spec:buildPodSpec(data)}}};if(Object.keys(data.annotations||{}).length)obj.metadata.annotations=data.annotations;return obj;}
        function buildDaemonSetYAML(data){const obj={apiVersion:'apps/v1',kind:'DaemonSet',metadata:{name:data.name,namespace:data.namespace||'default',labels:Object.keys(data.labels||{}).length?data.labels:undefined},spec:{selector:{matchLabels:data.selector||{}},template:{metadata:{labels:data.selector||{}},spec:buildPodSpec(data)}}};if(Object.keys(data.annotations||{}).length)obj.metadata.annotations=data.annotations;return obj;}
        function buildJobYAML(data){const obj={apiVersion:'batch/v1',kind:'Job',metadata:{name:data.name,namespace:data.namespace||'default',labels:Object.keys(data.labels||{}).length?data.labels:undefined},spec:{backoffLimit:data.backoffLimit||6,template:{metadata:{},spec:buildPodSpec(data)}}};if(Object.keys(data.annotations||{}).length)obj.metadata.annotations=data.annotations;return obj;}
        function buildCronJobYAML(data){const obj={apiVersion:'batch/v1',kind:'CronJob',metadata:{name:data.name,namespace:data.namespace||'default',labels:Object.keys(data.labels||{}).length?data.labels:undefined},spec:{schedule:data.schedule||'0 * * * *',concurrencyPolicy:data.concurrencyPolicy||'Forbid',successfulJobsHistoryLimit:data.successfulJobsHistoryLimit??3,failedJobsHistoryLimit:data.failedJobsHistoryLimit??1,startingDeadlineSeconds:data.startingDeadlineSeconds||undefined,jobTemplate:{spec:{template:{metadata:{},spec:buildPodSpec(data)}}}}};if(Object.keys(data.annotations||{}).length)obj.metadata.annotations=data.annotations;return obj;}

        function buildSecretYAML(data){const secretData={};Object.entries(data.data||{}).forEach(([k,v])=>{secretData[k]=/^[A-Za-z0-9+/]+=*$/.test(v)?v:btoa(v)});const obj={apiVersion:'v1',kind:'Secret',metadata:{name:data.name,namespace:data.namespace||'default',labels:Object.keys(data.labels||{}).length?data.labels:undefined},type:data.type||'Opaque',data:secretData};if(Object.keys(data.annotations||{}).length)obj.metadata.annotations=data.annotations;return obj;}

        function updateField(field,value){state.forms[state.currentType][field]=value;debouncedRender()}

        function updateEnv(containerIdx,idx,field,value){if(!state.forms[state.currentType].containers[containerIdx].env)state.forms[state.currentType].containers[containerIdx].env=[];if(!state.forms[state.currentType].containers[containerIdx].env[idx])state.forms[state.currentType].containers[containerIdx].env[idx]={};state.forms[state.currentType].containers[containerIdx].env[idx][field]=value;debouncedRender()}
        function updateResource(containerIdx,type,resource,value){if(!state.forms[state.currentType].containers[containerIdx].resources)state.forms[state.currentType].containers[containerIdx].resources={requests:{},limits:{}};if(!state.forms[state.currentType].containers[containerIdx].resources[type])state.forms[state.currentType].containers[containerIdx].resources[type]={};state.forms[state.currentType].containers[containerIdx].resources[type][resource]=value||undefined;debouncedRender()}
        function updateVolumeMount(containerIdx,idx,field,value){if(!state.forms[state.currentType].containers[containerIdx].volumeMounts)state.forms[state.currentType].containers[containerIdx].volumeMounts=[];if(!state.forms[state.currentType].containers[containerIdx].volumeMounts[idx])state.forms[state.currentType].containers[containerIdx].volumeMounts[idx]={};const val=field==='readOnly'?value==='true':value;state.forms[state.currentType].containers[containerIdx].volumeMounts[idx][field]=val;debouncedRender()}
        function updateVolume(idx,field,value){const volume=state.forms[state.currentType].volumes[idx];if(!volume)return;if(field==='name'){volume.name=value;}else if(field==='type'){volume.type=value;volume.emptyDir=undefined;volume.hostPath=undefined;volume.configMap=undefined;volume.secret=undefined;volume.persistentVolumeClaim=undefined;}else if(field==='hostPathPath'){if(!volume.hostPath)volume.hostPath={};volume.hostPath.path=value;}else if(field==='hostPathType'){if(!volume.hostPath)volume.hostPath={};volume.hostPath.type=value||undefined;}else if(field==='configMapName'){volume.configMap={name:value};}else if(field==='secretName'){volume.secret={secretName:value};}else if(field==='claimName'){volume.persistentVolumeClaim={claimName:value};}debouncedRender()}
        function updateImagePullSecret(idx,value){if(!state.forms[state.currentType].imagePullSecrets[idx])state.forms[state.currentType].imagePullSecrets[idx]={};state.forms[state.currentType].imagePullSecrets[idx].name=value;debouncedRender()}
        function updateServicePort(idx,field,value){if(!state.forms[state.currentType].ports[idx])state.forms[state.currentType].ports[idx]={};state.forms[state.currentType].ports[idx][field]=value;debouncedRender()}
        function updateServiceType(value){state.forms[state.currentType].type=value;debouncedRender()}
        function updateRestartPolicy(value){state.forms[state.currentType].restartPolicy=value;debouncedRender()}
        function updateSecretType(value){state.forms[state.currentType].type=value;debouncedRender()}
        function updateConfigMapKey(oldKey,newKey){const data=state.forms[state.currentType].data;const value=data[oldKey];delete data[oldKey];data[newKey]=value;debouncedRender()}
        function updateConfigMapValue(key,value){state.forms[state.currentType].data[key]=value;debouncedRender()}
        function updateSecretKey(oldKey,newKey){const data=state.forms[state.currentType].data;const value=data[oldKey];delete data[oldKey];data[newKey]=value;debouncedRender()}
        function updateSecretValue(key,value){state.forms[state.currentType].data[key]=value;debouncedRender()}
        function addPort(containerIdx){state.forms[state.currentType].containers[containerIdx].ports.push({name:'',protocol:'TCP',port:80,targetPort:80});renderForm()}
        function removePort(containerIdx,idx){state.forms[state.currentType].containers[containerIdx].ports.splice(idx,1);renderForm()}
        function addEnv(containerIdx){state.forms[state.currentType].containers[containerIdx].env.push({name:'',value:''});renderForm()}
        function removeEnv(containerIdx,idx){state.forms[state.currentType].containers[containerIdx].env.splice(idx,1);renderForm()}
        function addVolumeMount(containerIdx){state.forms[state.currentType].containers[containerIdx].volumeMounts.push({name:'',mountPath:''});renderForm()}
        function removeVolumeMount(containerIdx,idx){state.forms[state.currentType].containers[containerIdx].volumeMounts.splice(idx,1);renderForm()}
        function addContainer(){state.forms[state.currentType].containers.push({name:'app',image:'nginx:latest',command:'',args:'',ports:[],env:[],resources:{},volumeMounts:[]});renderForm()}
        function removeContainer(idx){state.forms[state.currentType].containers.splice(idx,1);renderForm()}
        function addVolume(){state.forms[state.currentType].volumes.push({name:'',type:'emptyDir',emptyDir:{}});renderForm()}
        function removeVolume(idx){state.forms[state.currentType].volumes.splice(idx,1);renderForm()}
        function addImagePullSecret(){state.forms[state.currentType].imagePullSecrets.push({name:''});renderForm()}
        function removeImagePullSecret(idx){state.forms[state.currentType].imagePullSecrets.splice(idx,1);renderForm()}
        function addServicePort(){state.forms[state.currentType].ports.push({name:'',protocol:'TCP',port:80,targetPort:80,nodePort:''});renderForm()}
        function removeServicePort(idx){state.forms[state.currentType].ports.splice(idx,1);renderForm()}
        function addConfigMapEntry(){state.forms[state.currentType].data['key'+generateId()]='';renderForm()}
        function removeConfigMapEntry(key){delete state.forms[state.currentType].data[key];renderForm()}
        function addSecretEntry(){state.forms[state.currentType].data['key'+generateId()]='';renderForm()}
        function removeSecretEntry(key){delete state.forms[state.currentType].data[key];renderForm()}
        function toggleCollapsible(id){const content=document.getElementById(id)?.querySelector('.collapsible-content');const toggle=document.getElementById(id)?.querySelector('.collapsible-toggle');if(content){content.classList.toggle('hidden');if(toggle)toggle.textContent=content.classList.contains('hidden')?'▶':'▼'}}

        function renderVolumeMountList(mounts,containerIdx){let html='';mounts.forEach((mount,idx)=>{html+=`<div class="list-item"><div class="list-item-header"><span class="list-item-title">挂载 ${idx+1}</span><button class="btn-remove" onclick="removeVolumeMount(${containerIdx},${idx})">删除</button></div><div class="form-row"><div class="form-group"><label>卷名称</label><input type="text" value="${mount.name||''}" onchange="updateVolumeMount(${containerIdx},${idx},'name',this.value)"></div><div class="form-group"><label>挂载路径</label><input type="text" value="${mount.mountPath||''}" onchange="updateVolumeMount(${containerIdx},${idx},'mountPath',this.value)"></div></div><div class="form-row"><div class="form-group"><label>只读</label><select onchange="updateVolumeMount(${containerIdx},${idx},'readOnly',this.value)"><option value="false" ${mount.readOnly!==true?'selected':''}>否</option><option value="true" ${mount.readOnly===true?'selected':''}>是</option></select></div></div></div>`});html+=`<button class="btn-add" onclick="addVolumeMount(${containerIdx})">+ 添加卷挂载</button>`;return html;}
        function renderPortList(ports,containerIdx){let html='';ports.forEach((port,idx)=>{html+=`<div class="list-item"><div class="list-item-header"><span class="list-item-title">端口 ${idx+1}</span><button class="btn-remove" onclick="removePort(${containerIdx},${idx})">删除</button></div><div class="form-row"><div class="form-group"><label>名称</label><input type="text" value="${port.name||''}" onchange="updatePort(${containerIdx},${idx},'name',this.value)"></div><div class="form-group"><label>协议</label><select onchange="updatePort(${containerIdx},${idx},'protocol',this.value)"><option value="TCP" ${port.protocol==='TCP'?'selected':''}>TCP</option><option value="UDP" ${port.protocol==='UDP'?'selected':''}>UDP</option><option value="SCTP" ${port.protocol==='SCTP'?'selected':''}>SCTP</option></select></div></div><div class="form-row"><div class="form-group"><label>端口 (Port)</label><input type="number" value="${port.port||80}" onchange="updatePort(${containerIdx},${idx},'port',this.value)"></div><div class="form-group"><label>目标端口 (TargetPort)</label><input type="text" value="${port.targetPort||80}" onchange="updatePort(${containerIdx},${idx},'targetPort',this.value)"></div></div></div>`});html+=`<button class="btn-add" onclick="addPort(${containerIdx})">+ 添加端口</button>`;return html;}
        function renderEnvList(envList,containerIdx){let html='';envList.forEach((env,idx)=>{html+=`<div class="list-item"><div class="list-item-header"><span class="list-item-title">${env.name||`Env ${idx+1}`}</span><button class="btn-remove" onclick="removeEnv(${containerIdx},${idx})">删除</button></div><div class="form-row"><div class="form-group"><label>名称</label><input type="text" value="${env.name||''}" onchange="updateEnv(${containerIdx},${idx},'name',this.value)"></div><div class="form-group"><label>值</label><input type="text" value="${env.value||''}" onchange="updateEnv(${containerIdx},${idx},'value',this.value)"></div></div></div>`});html+=`<button class="btn-add" onclick="addEnv(${containerIdx})">+ 添加环境变量</button>`;return html;}
        function renderContainerList(containers){let html='';containers.forEach((container,idx)=>{const isOpen=containers.length===1||idx===0;html+=`<div class="collapsible" id="container-${idx}"><div class="collapsible-header" onclick="toggleCollapsible('container-${idx}')"><span class="collapsible-title">容器: ${container.name||`Container ${idx+1}`}</span><span class="collapsible-toggle">${isOpen?'▼':'▶'}</span></div><div class="collapsible-content ${isOpen?'':'hidden'}"><div class="form-row"><div class="form-group"><label>容器名称 <span class="required">*</span></label><input type="text" value="${container.name||''}" onchange="updateContainer(${idx},'name',this.value)" placeholder="my-container"></div><div class="form-group"><label>镜像 <span class="required">*</span></label><input type="text" value="${container.image||''}" onchange="updateContainer(${idx},'image',this.value)" placeholder="nginx:latest"></div></div><div class="form-row"><div class="form-group"><label>命令 (Command)</label><input type="text" value="${container.command||''}" onchange="updateContainer(${idx},'command',this.value)" placeholder="nginx"></div><div class="form-group"><label>参数 (Args)</label><input type="text" value="${container.args||''}" onchange="updateContainer(${idx},'args',this.value)" placeholder="-g 'daemon off;'"></div></div><div class="form-section"><div class="section-title">端口</div><div id="ports-${idx}">${renderPortList(container.ports||[],idx)}</div></div><div class="form-section"><div class="section-title">环境变量</div><div id="env-list-${idx}">${renderEnvList(container.env||[],idx)}</div></div><div class="form-section"><div class="section-title">资源限制</div><div class="resource-grid"><div class="form-group"><label>CPU 请求</label><input type="text" value="${container.resources?.requests?.cpu||''}" onchange="updateResource(${idx},'requests','cpu',this.value)" placeholder="100m"></div><div class="form-group"><label>内存请求</label><input type="text" value="${container.resources?.requests?.memory||''}" onchange="updateResource(${idx},'requests','memory',this.value)" placeholder="128Mi"></div><div class="form-group"><label>CPU 限制</label><input type="text" value="${container.resources?.limits?.cpu||''}" onchange="updateResource(${idx},'limits','cpu',this.value)" placeholder="500m"></div><div class="form-group"><label>内存限制</label><input type="text" value="${container.resources?.limits?.memory||''}" onchange="updateResource(${idx},'limits','memory',this.value)" placeholder="512Mi"></div></div></div><div class="form-section"><div class="section-title">卷挂载</div><div id="volume-mounts-${idx}">${renderVolumeMountList(container.volumeMounts||[],idx)}</div></div>${containers.length>1?`<button class="btn-remove" onclick="removeContainer(${idx})" style="margin-top:10px;">删除此容器</button>`:''}</div></div></div>`});html+=`<button class="btn-add" onclick="addContainer()" style="margin-top:10px;">+ 添加容器</button>`;return html;}
        function renderVolumeList(volumes){let html='';volumes.forEach((vol,idx)=>{html+=`<div class="list-item"><div class="list-item-header"><span class="list-item-title">卷: ${vol.name||`Volume ${idx+1}`}</span><button class="btn-remove" onclick="removeVolume(${idx})">删除</button></div><div class="form-row"><div class="form-group"><label>卷名称 <span class="required">*</span></label><input type="text" value="${vol.name||''}" onchange="updateVolume(${idx},'name',this.value)"></div><div class="form-group"><label>类型</label><select onchange="updateVolume(${idx},'type',this.value)"><option value="emptyDir" ${vol.type==='emptyDir'?'selected':''}>emptyDir</option><option value="hostPath" ${vol.type==='hostPath'?'selected':''}>hostPath</option><option value="configMap" ${vol.type==='configMap'?'selected':''}>configMap</option><option value="secret" ${vol.type==='secret'?'selected':''}>secret</option><option value="persistentVolumeClaim" ${vol.type==='persistentVolumeClaim'?'selected':''}>persistentVolumeClaim</option></select></div></div>${vol.type==='hostPath'?`<div class="form-row"><div class="form-group"><label>Host Path</label><input type="text" value="${vol.hostPath?.path||''}" onchange="updateVolume(${idx},'hostPathPath',this.value)" placeholder="/var/log"></div><div class="form-group"><label>Path Type</label><select onchange="updateVolume(${idx},'hostPathType',this.value)"><option value="" ${!vol.hostPath?.type?'selected':''}>未指定</option><option value="Directory" ${vol.hostPath?.type==='Directory'?'selected':''}>Directory</option><option value="File" ${vol.hostPath?.type==='File'?'selected':''}>File</option><option value="DirectoryOrCreate" ${vol.hostPath?.type==='DirectoryOrCreate'?'selected':''}>DirectoryOrCreate</option></select></div></div>`:''}${vol.type==='configMap'?`<div class="form-group"><label>ConfigMap Name</label><input type="text" value="${vol.configMap?.name||''}" onchange="updateVolume(${idx},'configMapName',this.value)" placeholder="my-configmap"></div>`:''}${vol.type==='secret'?`<div class="form-group"><label>Secret Name</label><input type="text" value="${vol.secret?.secretName||''}" onchange="updateVolume(${idx},'secretName',this.value)" placeholder="my-secret"></div>`:''}${vol.type==='persistentVolumeClaim'?`<div class="form-group"><label>Claim Name</label><input type="text" value="${vol.persistentVolumeClaim?.claimName||''}" onchange="updateVolume(${idx},'claimName',this.value)" placeholder="my-pvc"></div>`:''}</div>`});html+=`<button class="btn-add" onclick="addVolume()">+ 添加卷</button>`;return html;}
        function renderImagePullSecrets(secrets){let html='';secrets.forEach((secret,idx)=>{html+=`<div class="list-item"><div class="list-item-header"><span class="list-item-title">Secret ${idx+1}</span><button class="btn-remove" onclick="removeImagePullSecret(${idx})">删除</button></div><div class="form-group"><label>Secret Name</label><input type="text" value="${secret.name||''}" onchange="updateImagePullSecret(${idx},this.value)"></div></div>`});html+=`<button class="btn-add" onclick="addImagePullSecret()">+ 添加 ImagePullSecret</button>`;return html;}
        function renderServicePorts(ports){let html='';ports.forEach((port,idx)=>{html+=`<div class="list-item"><div class="list-item-header"><span class="list-item-title">端口 ${idx+1}</span><button class="btn-remove" onclick="removeServicePort(${idx})">删除</button></div><div class="form-row"><div class="form-group"><label>名称</label><input type="text" value="${port.name||''}" onchange="updateServicePort(${idx},'name',this.value)"></div><div class="form-group"><label>协议</label><select onchange="updateServicePort(${idx},'protocol',this.value)"><option value="TCP" ${port.protocol==='TCP'?'selected':''}>TCP</option><option value="UDP" ${port.protocol==='UDP'?'selected':''}>UDP</option><option value="SCTP" ${port.protocol==='SCTP'?'selected':''}>SCTP</option></select></div></div><div class="form-row"><div class="form-group"><label>端口 (Port)</label><input type="number" value="${port.port||80}" onchange="updateServicePort(${idx},'port',parseInt(this.value))"></div><div class="form-group"><label>目标端口 (TargetPort)</label><input type="text" value="${port.targetPort||80}" onchange="updateServicePort(${idx},'targetPort',this.value)"></div></div><div class="form-row single"><div class="form-group"><label>NodePort (可选)</label><input type="number" value="${port.nodePort||''}" onchange="updateServicePort(${idx},'nodePort',this.value?parseInt(this.value):null)" placeholder="30000-32767"></div></div></div>`});html+=`<button class="btn-add" onclick="addServicePort()">+ 添加端口</button>`;return html;}
        function renderConfigMapData(data){let html='';Object.entries(data).forEach(([key,value])=>{html+=`<div class="list-item"><div class="list-item-header"><span class="list-item-title">${key}</span><button class="btn-remove" onclick="removeConfigMapEntry('${key.replace(/'/g,"\\'")}')">删除</button></div><div class="form-row"><div class="form-group"><label>Key</label><input type="text" value="${key}" onchange="updateConfigMapKey('${key.replace(/'/g,"\\'")}',this.value)"></div></div><div class="form-row single"><div class="form-group"><label>Value (支持多行)</label><textarea style="min-height:100px;" onchange="updateConfigMapValue('${key.replace(/'/g,"\\'")}',this.value)">${value}</textarea></div></div></div>`});html+=`<button class="btn-add" onclick="addConfigMapEntry()">+ 添加数据条目</button>`;return html;}
        function renderSecretData(data){let html='';Object.entries(data).forEach(([key,value])=>{const displayValue=/^[A-Za-z0-9+/]+=*$/.test(value)?atob(value):value;html+=`<div class="list-item"><div class="list-item-header"><span class="list-item-title">${key}</span><button class="btn-remove" onclick="removeSecretEntry('${key.replace(/'/g,"\\'")}')">删除</button></div><div class="form-row"><div class="form-group"><label>Key</label><input type="text" value="${key}" onchange="updateSecretKey('${key.replace(/'/g,"\\'")}',this.value)"></div></div><div class="form-row single"><div class="form-group"><label>Value (会自动 Base64 编码)</label><textarea style="min-height:60px;" onchange="updateSecretValue('${key.replace(/'/g,"\\'")}',this.value)">${displayValue}</textarea></div></div></div>`});html+=`<button class="btn-add" onclick="addSecretEntry()">+ 添加数据条目</button>`;return html;}

        function renderWorkloadForm(data,type){
            const showReplicas=['deployment','statefulset'].includes(type);
            const showServiceName=type==='statefulset';
            const showBackoffLimit=type==='job';
            const showSchedule=type==='cronjob';
            const showConcurrencyPolicy=type==='cronjob';
            const showJobHistory=type==='cronjob';
            const showStartingDeadline=type==='cronjob';
            let html=`<div class="form-section"><div class="section-title">基本信息</div><div class="form-row"><div class="form-group"><label>名称 <span class="required">*</span></label><input type="text" id="form-name" value="${data.name||''}" oninput="updateField('name',this.value)" placeholder="my-deployment"></div><div class="form-group"><label>命名空间</label><input type="text" id="form-namespace" value="${data.namespace||'default'}" oninput="updateField('namespace',this.value)" placeholder="default"></div></div><div class="form-row"><div class="form-group full-width"><label>Labels (每行: key=value)</label><textarea id="form-labels" oninput="updateLabels(this.value)">${Object.entries(data.labels||{}).map(([k,v])=>`${k}=${v}`).join('\n')}</textarea></div></div><div class="form-row"><div class="form-group full-width"><label>Annotations (每行: key=value)</label><textarea id="form-annotations" oninput="updateAnnotations(this.value)">${Object.entries(data.annotations||{}).map(([k,v])=>`${k}=${v}`).join('\n')}</textarea></div></div></div>`;
            if(showReplicas)html+=`<div class="form-section"><div class="section-title">副本设置</div><div class="form-group" style="max-width:200px;"><label>副本数 (Replicas)</label><input type="number" value="${data.replicas||1}" oninput="updateField('replicas',parseInt(this.value)||1)" min="1"></div></div>`;
            if(showServiceName)html+=`<div class="form-section"><div class="section-title">Headless Service</div><div class="form-group" style="max-width:300px;"><label>Service Name</label><input type="text" value="${data.serviceName||''}" oninput="updateField('serviceName',this.value)" placeholder="my-headless"></div></div>`;
            if(showSchedule)html+=`<div class="form-section"><div class="section-title">定时调度</div><div class="form-row"><div class="form-group"><label>Cron 表达式 <span class="required">*</span></label><input type="text" value="${data.schedule||'0 * * * *'}" oninput="updateField('schedule',this.value)" placeholder="0 * * * *"></div><div class="form-group"><label>并发策略</label><select onchange="updateField('concurrencyPolicy',this.value)"><option value="Allow" ${data.concurrencyPolicy==='Allow'?'selected':''}>Allow</option><option value="Forbid" ${data.concurrencyPolicy==='Forbid'?'selected':''}>Forbid</option><option value="Replace" ${data.concurrencyPolicy==='Replace'?'selected':''}>Replace</option></select></div></div><div class="form-row"><div class="form-group"><label>成功的 Job 历史数</label><input type="number" value="${data.successfulJobsHistoryLimit||3}" oninput="updateField('successfulJobsHistoryLimit',parseInt(this.value))" min="0"></div><div class="form-group"><label>失败的 Job 历史数</label><input type="number" value="${data.failedJobsHistoryLimit||1}" oninput="updateField('failedJobsHistoryLimit',parseInt(this.value))" min="0"></div></div><div class="form-group" style="max-width:200px;"><label>启动截止时间 (秒)</label><input type="number" value="${data.startingDeadlineSeconds||''}" oninput="updateField('startingDeadlineSeconds',this.value?parseInt(this.value):null)" placeholder="200"></div></div>`;
            if(showBackoffLimit)html+=`<div class="form-section"><div class="section-title">Job 设置</div><div class="form-group" style="max-width:200px;"><label>Backoff Limit</label><input type="number" value="${data.backoffLimit||6}" oninput="updateField('backoffLimit',parseInt(this.value)||6)" min="0"></div></div>`;
            html+=`<div class="form-section"><div class="section-title">选择器 (Selector)</div><div class="form-group"><label>Match Labels (每行: key=value)</label><textarea id="form-selector" oninput="updateSelector(this.value)">${Object.entries(data.selector||{}).map(([k,v])=>`${k}=${v}`).join('\n')}</textarea></div></div><div class="form-section"><div class="section-title">容器</div><div id="container-list">${renderContainerList(data.containers||[])}</div></div><div class="form-section"><div class="section-title">Pod 模板设置</div><div class="form-row"><div class="form-group"><label>重启策略</label><select onchange="updateRestartPolicy(this.value)"><option value="Always" ${data.restartPolicy==='Always'?'selected':''}>Always</option><option value="OnFailure" ${data.restartPolicy==='OnFailure'?'selected':''}>OnFailure</option><option value="Never" ${data.restartPolicy==='Never'?'selected':''}>Never</option></select></div><div class="form-group"><label>服务账号 (Service Account)</label><input type="text" value="${data.serviceAccount||''}" oninput="updateField('serviceAccount',this.value)" placeholder="default"></div></div></div><div class="form-section"><div class="section-title">卷 (Volumes)</div><div id="volume-list">${renderVolumeList(data.volumes||[])}</div></div><div class="form-section"><div class="section-title">Image Pull Secrets</div><div id="image-pull-secrets">${renderImagePullSecrets(data.imagePullSecrets||[])}</div></div>`;
            return html;
        }
        function renderServiceForm(data){return`<div class="form-section"><div class="section-title">基本信息</div><div class="form-row"><div class="form-group"><label>名称 <span class="required">*</span></label><input type="text" id="form-name" value="${data.name||''}" oninput="updateField('name',this.value)" placeholder="my-service"></div><div class="form-group"><label>命名空间</label><input type="text" id="form-namespace" value="${data.namespace||'default'}" oninput="updateField('namespace',this.value)" placeholder="default"></div></div><div class="form-row"><div class="form-group full-width"><label>Labels (每行: key=value)</label><textarea id="form-labels" oninput="updateLabels(this.value)">${Object.entries(data.labels||{}).map(([k,v])=>`${k}=${v}`).join('\n')}</textarea></div></div><div class="form-row"><div class="form-group full-width"><label>Annotations (每行: key=value)</label><textarea id="form-annotations" oninput="updateAnnotations(this.value)">${Object.entries(data.annotations||{}).map(([k,v])=>`${k}=${v}`).join('\n')}</textarea></div></div></div><div class="form-section"><div class="section-title">Service 设置</div><div class="form-row"><div class="form-group"><label>类型</label><select onchange="updateServiceType(this.value)"><option value="ClusterIP" ${data.type==='ClusterIP'?'selected':''}>ClusterIP</option><option value="NodePort" ${data.type==='NodePort'?'selected':''}>NodePort</option><option value="LoadBalancer" ${data.type==='LoadBalancer'?'selected':''}>LoadBalancer</option><option value="ExternalName" ${data.type==='ExternalName'?'selected':''}>ExternalName</option></select></div></div></div><div class="form-section"><div class="section-title">选择器 (Selector)</div><div class="form-group"><label>Match Labels (每行: key=value)</label><textarea id="form-selector" oninput="updateSelector(this.value)">${Object.entries(data.selector||{}).map(([k,v])=>`${k}=${v}`).join('\n')}</textarea></div></div><div class="form-section"><div class="section-title">端口映射</div><div id="service-ports">${renderServicePorts(data.ports||[])}</div></div>`;}
        function renderConfigMapForm(data){return`<div class="form-section"><div class="section-title">基本信息</div><div class="form-row"><div class="form-group"><label>名称 <span class="required">*</span></label><input type="text" id="form-name" value="${data.name||''}" oninput="updateField('name',this.value)" placeholder="my-configmap"></div><div class="form-group"><label>命名空间</label><input type="text" id="form-namespace" value="${data.namespace||'default'}" oninput="updateField('namespace',this.value)" placeholder="default"></div></div><div class="form-row"><div class="form-group full-width"><label>Labels (每行: key=value)</label><textarea id="form-labels" oninput="updateLabels(this.value)">${Object.entries(data.labels||{}).map(([k,v])=>`${k}=${v}`).join('\n')}</textarea></div></div><div class="form-row"><div class="form-group full-width"><label>Annotations (每行: key=value)</label><textarea id="form-annotations" oninput="updateAnnotations(this.value)">${Object.entries(data.annotations||{}).map(([k,v])=>`${k}=${v}`).join('\n')}</textarea></div></div></div><div class="form-section"><div class="section-title">数据条目 (Data)</div><div id="configmap-data">${renderConfigMapData(data.data||{})}</div></div>`;}
        function renderSecretForm(data){return`<div class="form-section"><div class="section-title">基本信息</div><div class="form-row"><div class="form-group"><label>名称 <span class="required">*</span></label><input type="text" id="form-name" value="${data.name||''}" oninput="updateField('name',this.value)" placeholder="my-secret"></div><div class="form-group"><label>命名空间</label><input type="text" id="form-namespace" value="${data.namespace||'default'}" oninput="updateField('namespace',this.value)" placeholder="default"></div></div><div class="form-row single"><div class="form-group"><label>类型</label><select onchange="updateSecretType(this.value)"><option value="Opaque" ${data.type==='Opaque'?'selected':''}>Opaque (通用)</option><option value="kubernetes.io/service-account-token" ${data.type==='kubernetes.io/service-account-token'?'selected':''}>Service Account Token</option><option value="kubernetes.io/dockerconfigjson" ${data.type==='kubernetes.io/dockerconfigjson'?'selected':''}>Docker Registry</option><option value="kubernetes.io/tls" ${data.type==='kubernetes.io/tls'?'selected':''}>TLS Certificate</option><option value="kubernetes.io/basic-auth" ${data.type==='kubernetes.io/basic-auth'?'selected':''}>Basic Auth</option></select></div></div><div class="form-row"><div class="form-group full-width"><label>Labels (每行: key=value)</label><textarea id="form-labels" oninput="updateLabels(this.value)">${Object.entries(data.labels||{}).map(([k,v])=>`${k}=${v}`).join('\n')}</textarea></div></div><div class="form-row"><div class="form-group full-width"><label>Annotations (每行: key=value)</label><textarea id="form-annotations" oninput="updateAnnotations(this.value)">${Object.entries(data.annotations||{}).map(([k,v])=>`${k}=${v}`).join('\n')}</textarea></div></div></div><div class="form-section"><div class="section-title">数据条目 (Data)</div><div id="secret-data">${renderSecretData(data.data||{})}</div><p style="font-size:11px;color:var(--text2);margin-top:8px;"><strong>提示:</strong> 值会自动进行 Base64 编码。</p></div>`;}

        function initForms(){Object.keys(defaults).forEach(type=>{state.forms[type]=deepClone(defaults[type])})}
        function renderTemplateBar(type){const bar=document.getElementById('templateBar');const templatesForType=templates[type]||[];bar.innerHTML=templatesForType.map(t=>`<button class="btn-template" onclick="applyTemplate('${type}',${JSON.stringify(t.data).replace(/"/g,'&quot;')})">${t.name}</button>`).join('')}
        function applyTemplate(type,data){state.forms[type]=deepClone(data);renderForm()}
        function renderForm(){const container=document.getElementById('formContent');const type=state.currentType;const data=state.forms[type];let html='';switch(type){case'deployment':case'statefulset':case'daemonset':case'job':case'cronjob':case'pod':html=renderWorkloadForm(data,type);break;case'service':html=renderServiceForm(data);break;case'configmap':html=renderConfigMapForm(data);break;case'secret':html=renderSecretForm(data);break;}container.innerHTML=html;renderTemplateBar(type);updatePreview()}
        const debouncedRender=debounce(updatePreview,150);
        function updatePreview(){const type=state.currentType;const data=state.forms[type];const yaml=generateYAML(type,data);const highlighted=syntaxHighlight(yaml);document.getElementById('yamlPreview').innerHTML=highlighted}
        function switchTab(type){state.currentType=type;document.querySelectorAll('.tab').forEach(t=>{t.classList.toggle('active',t.dataset.type===type)});renderForm()}
        function copyYAML(){const yaml=document.getElementById('yamlPreview').textContent;navigator.clipboard.writeText(yaml).then(()=>{const btn=document.getElementById('btnCopy');btn.textContent='已复制!';btn.classList.add('copied');setTimeout(()=>{btn.textContent='复制';btn.classList.remove('copied')},2000)})}
        function downloadYAML(){const type=state.currentType;const data=state.forms[type];const yaml=generateYAML(type,data);const blob=new Blob([yaml],{type:'text/yaml'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`${type}-${data.name||'untitled'}.yaml`;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url)}
        document.addEventListener('DOMContentLoaded',()=>{initForms();document.getElementById('tabs').addEventListener('click',(e)=>{if(e.target.classList.contains('tab'))switchTab(e.target.dataset.type)});document.getElementById('btnCopy').addEventListener('click',copyYAML);document.getElementById('btnDownload').addEventListener('click',downloadYAML);renderForm()});
    </script>
</body>
</html>
